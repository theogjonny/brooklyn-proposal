<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brooklyn ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    overflow:hidden;
    color:white;
}

/* Background */
.section-bg {
    position:fixed;
    width:100%;
    height:100%;
    background:url('bg.jpg') center/cover no-repeat;
    filter:brightness(0.6);
    z-index:-2;
}

/* Flash effect */
#flash {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    z-index:999;
}

/* Start */
#startScreen {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo {
    width:80%;
    max-width:300px;
}

#startBtn {
    padding:15px 40px;
    font-size:22px;
    background:red;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-family:'Bangers', cursive;
}

/* Main card */
.container {
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.95);
    color:black;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
}

.title {
    font-family:'Bangers', cursive;
    font-size:40px;
}

button {
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.yes { background:#ff1a1a; color:white; }
.no {
    background:#222;
    color:white;
    position:absolute;
}

/* Llama full screen */
#llamaScreen {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url('llama.png') center/cover no-repeat;
}

/* Victory */
#victory {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(#ff0000,#660000);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.banner {
    font-family:'Bangers', cursive;
    font-size:50px;
}

.message {
    font-size:20px;
    margin-top:15px;
}

/* Confetti */
.confetti {
    position:fixed;
    width:10px;
    height:10px;
    top:0;
    animation:fall linear infinite;
}

@keyframes fall {
    to {transform:translateY(100vh) rotate(360deg);}
}

/* Shake */
.shake {
    animation:shake 0.4s;
}

@keyframes shake {
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,-5px);}
    50%{transform:translate(-5px,5px);}
    75%{transform:translate(5px,5px);}
    100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div class="section-bg"></div>
<div id="flash"></div>

<!-- START -->
<div id="startScreen">
    <img src="logo.jpg" class="logo">
    <h2>Brooklyn's Lobby 🎮</h2>
    <button id="startBtn" onclick="start()">ENTER GAME</button>
</div>

<!-- MAIN -->
<div class="container">

    <div class="title">Brooklyn 🐐❤️</div>

    <p>
    You already know you're the GOAT...<br><br>
    And honestly? I miss being on your team.
    </p>

    <p>
    I’d drop anywhere on the map…<br>
    as long as it’s with you 😏
    </p>

    <h3>Will you be my girlfriend again? 🌷</h3>

    <button class="yes" onclick="yes()">YES</button>
    <button class="no" id="noBtn">NO</button>

</div>

<!-- LLAMA SCREEN -->
<div id="llamaScreen"></div>

<!-- VICTORY -->
<div id="victory">
    <div class="banner">🏆 VICTORY ROYALE 🏆</div>
    <div class="message">
        Thank you for giving me another chance ❤️<br>
        I won’t fumble this time.
    </div>
</div>

<audio id="winSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3">
</audio>

<script>

// Start
function start(){
    document.getElementById("startScreen").style.display="none";
    document.querySelector(".container").style.display="block";
}

// Moving NO
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.position="fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES
function yes(){
    document.querySelector(".container").style.display="none";

    // Flash
    const flash = document.getElementById("flash");
    flash.style.opacity = 1;
    setTimeout(()=>flash.style.opacity=0,200);

    // Shake
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),400);

    // Show llama first
    document.getElementById("llamaScreen").style.display="block";

    setTimeout(()=>{
        document.getElementById("llamaScreen").style.display="none";
        document.getElementById("victory").style.display="flex";
    },1200);

    document.getElementById("winSound").play();

    // Confetti
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
